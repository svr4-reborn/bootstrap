sources:
  - name: svr4ufs
    git: 'https://github.com/svr4-reborn/ufs_fuse'
    branch: 'main'
    version: '0.0pl@ROLLING_ID@'
    rolling_version: true
    subdir: 'ports'

tools:
  - name: host-svr4-ufs
    architecture: noarch
    from_source: svr4ufs
    revision: 1
    containerless: true
    install:
      - args:
        - cargo
        - 'build'
        - '--locked'
        - '--target-dir'
        - '@THIS_BUILD_DIR@'
        - '--manifest-path'
        - '@THIS_SOURCE_DIR@/Cargo.toml'
        - '-j@PARALLELISM@'
      - args:
        - cargo
        - 'install'
        - '--locked'
        - '--target-dir'
        - '@THIS_BUILD_DIR@'
        - '--root'
        - '@PREFIX@'
        - '--path'
        - '@THIS_SOURCE_DIR@/bins/svr4-disk-image'
      - args:
        - cargo
        - 'install'
        - '--locked'
        - '--target-dir'
        - '@THIS_BUILD_DIR@'
        - '--root'
        - '@PREFIX@'
        - '--path'
        - '@THIS_SOURCE_DIR@/bins/svr4-ufs-populate'
      - args:
        - cargo
        - 'install'
        - '--locked'
        - '--target-dir'
        - '@THIS_BUILD_DIR@'
        - '--root'
        - '@PREFIX@'
        - '--path'
        - '@THIS_SOURCE_DIR@/bins/svr4-ufs-mount'

tasks:
  - name: initialize-empty-image
    tools_required:
      - tool: host-svr4-ufs
    args: |
      svr4-disk-image create-layout --size @OPTION:image-size@ --output hdd.img --disk-addressing lba28
      svr4-disk-image format-ufs --slice root --block-size 4096 hdd.img
      svr4-disk-image format-bfs --slice stand hdd.img
    workdir: '@BUILD_ROOT@'
    containerless: true

  # Rebuilds the image contents from the sysroot, idempotently, so a rebuilt
  # kernel/userland is picked up on every run. make-image.py rsyncs the sysroot
  # into the root UFS over the FUSE mount, rebuilds /stand (BFS) wholesale, and
  # reinstalls the bootloader; it creates the layout itself if hdd.img is absent,
  # so initialize-empty-image is optional.
  #
  # A *full build* (no image yet, or the /dev device table changed) reformats the
  # root slice and recreates the kernel /dev nodes via mknod, which needs root —
  # run this task under sudo in that case. A *refresh* (image present, device
  # table unchanged — tracked by the hdd.img.devtab.sha256 sidecar) skips the
  # device-node pass and runs rsync-only, so it needs no root. The task never
  # invokes sudo itself; make-image.py errors with guidance if root is required
  # but absent.
  - name: populate-image
    tools_required:
      - tool: host-svr4-ufs
    args: |
      python3 @SOURCE_ROOT@/scripts/gen-device-table.py --kernel-conf system-root/etc/conf --output devices.tab
      python3 @SOURCE_ROOT@/scripts/make-image.py --image hdd.img --sysroot system-root --device-table devices.tab --size @OPTION:image-size@ --block-size 4096
    workdir: '@BUILD_ROOT@'
    containerless: true

  - name: populate-image-sudo
    tools_required:
      - tool: host-svr4-ufs
    args: |
      python3 @SOURCE_ROOT@/scripts/gen-device-table.py --kernel-conf system-root/etc/conf --output devices.tab
      sudo env PATH="$PATH" python3 @SOURCE_ROOT@/scripts/make-image.py --image hdd.img --sysroot system-root --device-table devices.tab --size @OPTION:image-size@ --block-size 4096
      # chown both the hdd.img and the sidecar, so the non-sudo populate-image can refresh it on subsequent runs without sudo.
      sudo chown "$USER":"$USER" hdd.img hdd.img.devtab.sha256
    workdir: '@BUILD_ROOT@'
    containerless: true

  - name: qemu
    args: |
      qemu-system-i386 \
        -drive file=hdd.img,format=raw,if=ide \
        -vga cirrus \
        -m @OPTION:ram-size@M \
        -debugcon stdio
    workdir: '@BUILD_ROOT@'
    containerless: true

  - name: qemu-kvm
    args: |
      qemu-system-i386 \
        -drive file=hdd.img,format=raw,if=ide \
        -vga cirrus \
        -m 64M \
        -debugcon stdio \
        -enable-kvm \
        -no-reboot \
        -no-shutdown
    workdir: '@BUILD_ROOT@'
    containerless: true
