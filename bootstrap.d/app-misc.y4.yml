packages:
  - name: fastfetch
    metadata:
      summary: A neofetch-like tool for fetching system information
      description: This package provides fastfetch, a tool to display system information in a visually pleasing way.
      spdx: 'MIT'
      website: 'https://github.com/fastfetch-cli/fastfetch'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['app-misc']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://github.com/fastfetch-cli/fastfetch.git'
      tag: '2.64.2'
      version: '2.64.2'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - libXrandr
      - mesa
      - zlib
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-S'
        - '@THIS_SOURCE_DIR@'
        - '-B'
        - '@THIS_BUILD_DIR@'
        - '-G'
        - 'Ninja'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/cmake-@OPTION:arch@.toolchain'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_INSTALL_LIBDIR=lib'
        - '-DCMAKE_BUILD_TYPE=Release'
        - '-DCMAKE_SYSROOT=@SYSROOT_DIR@'
        - '-DCMAKE_FIND_ROOT_PATH=@SYSROOT_DIR@'
        - '-DENABLE_RPM=OFF'
        - '-DENABLE_ZLIB=ON'
        - '-DENABLE_SYSTEM_YYJSON=OFF'
        - '-DINSTALL_LICENSE=OFF'
        - '-DBUILD_FLASHFETCH=OFF'
        - '-DENABLE_CHAFA=OFF'
        - '-DENABLE_DBUS=OFF'
        - '-DENABLE_DCONF=OFF'
        - '-DENABLE_DDCUTIL=OFF'
        - '-DENABLE_DRM=OFF'
        - '-DENABLE_ELF=OFF'
        - '-DENABLE_EGL=OFF'
        - '-DENABLE_GIO=OFF'
        - '-DENABLE_GLX=ON'
        - '-DENABLE_IMAGEMAGICK6=OFF'
        - '-DENABLE_IMAGEMAGICK7=OFF'
        - '-DENABLE_OPENCL=OFF'
        - '-DENABLE_OSMESA=OFF'
        - '-DENABLE_PULSE=OFF'
        - '-DENABLE_SQLITE3=OFF'
        - '-DENABLE_VULKAN=OFF'
        - '-DENABLE_WAYLAND=OFF'
        - '-DENABLE_XCB_RANDR=OFF'
        - '-DENABLE_XFCONF=OFF'
        - '-DENABLE_XRANDR=ON'
        - '-DBUILD_TESTS=OFF'
        - '-DPACKAGES_DISABLE_XBPS=OFF'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['cmake', '--build', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['cmake', '--install', '@THIS_BUILD_DIR@']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: fastfetch-dbg
        include: ['/usr/lib/debug/**']
