packages:
  - name: xcb-proto
    metadata:
      summary: XML-XCB protocol descriptions
      description: This package provides the XML-XCB protocol descriptions used by libxcb.
      spdx: 'MIT'
      website: 'https://xcb.freedesktop.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-base']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/proto/xcbproto.git'
      commit: '77d7fc04da729ddc5ed4aacf30253726fac24dca'
      branch: 'master'
      version: '1.17.0'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            NOCONFIGURE: '1'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true

  - name: xorg-proto
    metadata:
      summary: X.Org protocol headers
      description: This package provides the protocol headers for X.Org.
      spdx: 'MIT'
      website: 'https://www.x.org/wiki/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-base']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      url: 'https://xorg.freedesktop.org/archive/individual/proto/xorgproto-2025.1.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:4202efbfe560afccb5a742f3c64973a4936878ed7ec4259bc31b7317e5cde505666fee2855dd0b6ff169a8da87d0f980dfa65ff58d2ead0aad39f3a94e053903
      extract_path: 'xorgproto-2025.1'
      version: '2025.1'
      patch-path-strip: 1
      tools_required:
        - host-automake-v1.16
      regenerate:
        - args: |
            find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true

  - name: xorg-server
    labels: [aarch64]
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/xserver.git'
      tag: 'xorg-server-21.1.23'
      version: '21.1.23'
    tools_required:
      - cross-gcc
      - host-xtrans
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - virtual: pkgconfig-for-host
        program_name: host-pkg-config
    pkgs_required:
      - mlibc
      - libbsd
      - libfontenc
      - libX11
      - libXau
      - libxcb
      - libXcvt
      - libXdmcp
      - libXext
      - libXfont2
      - libxkbfile
      - openssl
      - pixman
      - xauth
      - xbitmaps
      - xcb-util
      - xinit
      - xkbcomp
      - xorg-font-util
      - xkeyboard-config
      - xtrans
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '-Dvendor_name="SVR4 Reborn"'
        - '-Dvendor_name_short="SVR4reborn"'
        - '-Dvendor_web="https://github.com/svr4-reborn"'
        - '-Dxkb_dir=${prefix}/share/X11/xkb'
        - '-Dxkb_output_dir=/var/lib/xkb'
        - '-Ddefault_font_path=${prefix}/share/fonts/X11'
        - '-Dxorg=true'
        - '-Dxv=true'
        - '-Dxvfb=true'
        - '-Dxephyr=false'
        - '-Dxnest=false'
        - '-Dsuid_wrapper=false'
        - '-Dpciaccess=false'
        - '-Ddpms=false'
        - '-Dscreensaver=true'
        - '-Dxres=false'
        - '-Dxvmc=false'
        - '-Dsystemd_logind=false'
        - '-Dsecure-rpc=false'
        - '-Dudev=false'
        - '-Dudev_kms=false'
        - '-Ddri1=false'
        - '-Ddri2=false'
        - '-Ddri3=false'
        - '-Dint10=false'
        - '-Dvgahw=false'
        - '-Ddrm=false'
        - '-Dglamor=false'
        - '-Dglx=false'
        - '-Dxdmcp=false'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      # We also use this package to create some folders and stuff that Xorg will need to run.
      - args: ['mkdir', '-p', '@THIS_COLLECT_DIR@/var/lib/xkb']
      - args: ['mkdir', '-p', '@THIS_COLLECT_DIR@/tmp/.X11-unix']
      # Also ship a simple .xinitrc file into root/.xinitrc to start Xorg with twm and xterm.
      # TODO: this should be somewhere better, also this technically makes a round dependency between xorg-server and twm/xterm, but for now it's fine.
      - args: |
          mkdir -p @THIS_COLLECT_DIR@/root
          echo 'xterm &' > @THIS_COLLECT_DIR@/root/.xinitrc
          echo 'exec twm' >> @THIS_COLLECT_DIR@/root/.xinitrc
      # Ensure the empty directories get shipped
      - args: ['python3', '@SOURCE_ROOT@/scripts/keep-empty-directories.py', '@THIS_COLLECT_DIR@']
