sources:
  - name: xtrans
    subdir: ports
    git: 'https://gitlab.freedesktop.org/xorg/lib/libxtrans.git'
    commit: 'cf05ba4a10c90da2c63805a5375e983b174e28b0'
    branch: 'master'
    version: '1.6.0'
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-libtool
      - host-pkg-config
      - host-xorg-util-macros
    regenerate:
      - args: ['./autogen.sh']
        environ:
          NOCONFIGURE: '1'

tools:
  - name: host-xtrans
    architecture: noarch
    exports_aclocal: true
    from_source: xtrans
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: libfontenc
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libfontenc.git'
      tag: 'libfontenc-1.1.9'
      version: '1.1.9'
    tools_required:
      - cross-gcc
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - host-autoconf-v2.71
      - host-automake-v1.15
      - host-pkg-config
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
      - libX11
      - xtrans
      - xorg-font-util
      - zlib
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Ddefault_library=shared'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['ninja', '-j@PARALLELISM@']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libXau-dbg
        include: ['/usr/lib/debug/**']

  - name: libX11
    architecture: '@OPTION:arch@'
    metadata:
      summary: X.Org X11 library
      description: This package provides the core X11 library.
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/xorg/lib/libX11'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libx11.git'
      tag: 'libX11-1.8.13'
      version: '1.8.13'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.15
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
        - host-xtrans
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-gcc
      - host-autoconf-v2.69
      - host-automake-v1.15
      - host-pkg-config
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
      - libxcb
      - xtrans
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
        - '--disable-ipv6'
        - '--disable-malloc0returnsnull'
        - '--with-keysymdefdir=@SYSROOT_DIR@/usr/include/X11'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: libXau
    metadata:
      summary: X authority file utility library
      description: This package provides the X authority file utility library.
      spdx: 'MIT'
      website: 'https://www.x.org/wiki/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-libs']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libxau.git'
      commit: 'a9c65683e68b3a4349afee5d7673b393fb924d2e'
      branch: 'master'
      version: '1.0.12'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-proto
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Ddefault_library=shared'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['ninja', '-j@PARALLELISM@']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libXau-dbg
        include: ['/usr/lib/debug/**']

  - name: libxcb
    architecture: '@OPTION:arch@'
    metadata:
      summary: X C-language Bindings library
      description: The libxcb package provides an interface to the X Window System protocol, which replaces the current Xlib interface. Xlib can also use XCB as a transport layer, allowing software to make requests and receive responses with both.
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/xorg/lib/libxcb'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libxcb.git'
      tag: 'libxcb-1.17.0'
      version: '1.17'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-gcc
      - host-autoconf-v2.69
      - host-automake-v1.15
      - host-pkg-config
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
      - libXau
      - libXdmcp
      - xcb-proto
    revision: 3
    configure:
      - args: ['sed', '-i', "s/pthread-stubs//", '@THIS_SOURCE_DIR@/configure']
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
        - '--without-doxygen'
        - '--with-sysroot=@SYSROOT_DIR@' # Set libtool's lt_sysroot.
        environ:
          PYTHON: 'python3'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: libXdmcp
    metadata:
      summary: X Display Manager Control Protocol library
      description: This package provides the X Display Manager Control Protocol library.
      spdx: 'MIT'
      website: 'https://www.x.org/wiki/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-libs']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libxdmcp.git'
      commit: '1192d3bc407348ff316bd3bffc791b3ac73f591b'
      branch: 'master'
      version: '1.1.5'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
      regenerate:
        - args: ['mkdir', '-p', 'm4']
        - args: ['./autogen.sh']
          environ:
            NOCONFIGURE: '1'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--enable-shared'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libXdmcp-dbg
        include: ['/usr/lib/debug/**']

  - name: libXext
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/lib/libxext.git'
      tag: 'libXext-1.3.7'
      version: '1.3.7'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
        - host-autoconf-archive
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-gcc
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-pkg-config
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
      - libX11
      - xtrans
    revision: 3
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
        - '--disable-malloc0returnsnull'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xtrans
    metadata:
      summary: X transport library
      description: This package provides the X transport library.
      spdx: 'MIT'
      website: 'https://www.x.org/wiki/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['x11-libs']
    architecture: '@OPTION:arch@'
    from_source: xtrans
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - xorg-proto
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
