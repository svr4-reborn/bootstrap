packages:
  - name: freetype
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: High-quality and portable font engine
      description: This package contains a library which allows applications to properly render TrueType fonts.
      spdx: 'GPL-2.0-or-later'
      website: 'https://www.freetype.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-libs']
    source:
      subdir: 'ports'
      git: 'https://gitlab.freedesktop.org/freetype/freetype.git'
      tag: 'VER-2-14-3'
      version: '2.14.3'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
      regenerate:
        - args: ['./autogen.sh']
          isolate_network: false
          environ:
            NOCONFIGURE: '1'
        - args: |
            find @THIS_SOURCE_DIR@ -name *config.sub -exec cp -pv @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name *config.guess -exec cp -pv @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
        # Enable GX/AAT and OpenType table validation
        - args: |
            sed -ri "s:.*(AUX_MODULES.*valid):\1:" @THIS_SOURCE_DIR@/modules.cfg
        # Enable subpixel rendering
        - args: |
            sed -r "s:.*(#.*SUBPIXEL_RENDERING) .*:\1:" -i @THIS_SOURCE_DIR@/include/freetype/config/ftoption.h
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
      - bzip2
      - libpng
      - zlib
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--with-harfbuzz=no'
        - '--enable-freetype-config'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: freetype-dbg
        include: ['/usr/lib/debug/**']

  - name: fontconfig
    architecture: '@OPTION:arch@'
    metadata:
      summary: A library for configuring and customizing font access
      description: This package contains a library and support programs used for configuring and customizing font access.
      spdx: 'MIT'
      website: 'https://fontconfig.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/fontconfig/fontconfig'
      tag: '2.18.1'
      version: '2.18.1'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
        # Make sure we regenerate this file
        - args: ['rm', '-f', 'src/fcobjshash.h']
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.16
      - cross-gcc
      - host-libtool
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - freetype
      - libxml
      - libiconv
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-docs'
        - '--with-sysroot=@SYSROOT_DIR@' # Set libtool's lt_sysroot.
        - '--enable-libxml2'
        - '--docdir=/usr/share/doc/fontconfig-2.18.1'
        environ:
          fc_cv_c99_vsnprintf: 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/keep-empty-directories.py', '@THIS_COLLECT_DIR@']

  - name: mesa
    architecture: '@OPTION:arch@'
    metadata:
      summary: Mesa 3D Graphics Library
      description: This package provides the Mesa software OpenGL implementation (softpipe gallium driver, xlib GLX).
      spdx: 'MIT'
      website: 'https://www.mesa3d.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/mesa/mesa.git'
      tag: 'mesa-26.1.2'
      version: '26.1.2'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - libexpat
      - libX11
      - libxcb
      - libXext
      - libXshmfence
      - libXxf86vm
      - libXrandr
      - zlib
      - zstd
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dglx=xlib'
        - '-Dplatforms=x11'
        - '-Dgallium-drivers=softpipe'
        - '-Dvulkan-drivers='
        - '-Dvideo-codecs=all_free'
        - '-Dllvm=disabled'
        - '-Dsse2=false'
        - '-Dsse41=false'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: mesa-dbg
        include: ['/usr/lib/debug/**']

  - name: glu
    architecture: '@OPTION:arch@'
    metadata:
      summary: Mesa OpenGL Utility library
      description: This package provides the GLU (OpenGL utility) library.
      spdx: 'SGI-B-2.0'
      website: 'https://gitlab.freedesktop.org/mesa/glu'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/mesa/glu.git'
      tag: 'glu-9.0.3'
      version: '9.0.3'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - mesa
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dgl_provider=gl'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: glu-dbg
        include: ['/usr/lib/debug/**']

  - name: mesa-demos
    architecture: '@OPTION:arch@'
    metadata:
      summary: Mesa demos and tools
      description: This package provides demonstration and test programs for Mesa (e.g. glxgears, glxinfo).
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/mesa/demos'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-libs']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/mesa/demos.git'
      tag: 'mesa-demos-9.0.0'
      version: '9.0.0'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - freetype
      - mesa
      - glu
      - libX11
      - libXext
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dgles1=disabled'
        - '-Dosmesa=disabled'
        - '-Dlibdrm=disabled'
        - '-Dx11=enabled'
        - '-Dwith-system-data-files=true'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
          CFLAGS: '-D_XOPEN_SOURCE -D_GNU_SOURCE'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
