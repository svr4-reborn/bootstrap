sources:
  - name: file
    subdir: ports
    git: 'https://github.com/file/file.git'
    tag: 'FILE5_48'
    version: '5.48'
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-libtool
    regenerate:
      - args: ['autoreconf', '-f', '-i']

tools:
  - name: host-file
    architecture: noarch
    from_source: file
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-libtool
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: coreutils
    metadata:
      summary: GNU core utilities
      description: This package provides the basic file, shell and text manipulation utilities from GNU coreutils.
      spdx: 'GPL-3.0-or-later'
      website: 'https://www.gnu.org/software/coreutils/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['sys-apps']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      url: 'https://ftpmirror.gnu.org/gnu/coreutils/coreutils-9.7.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:e5e5f7ec26c3952eb6a25988f78d3a1f8a70cf97a2fbc7b433dfcd1721cd38e6e0a8b9cb83f854a22df325bcb5ea8c4534c5a217273762cd5d575b381db69ee8
      extract_path: 'coreutils-9.7'
      version: '9.7'
      patch-path-strip: 1
      tools_required:
        - host-automake-v1.16
      regenerate:
        - args: |
            find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
    tools_required:
      - cross-gcc
      - host-pkg-config
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--enable-no-install-program=mkfifo,runcon,chroot'
        - '--disable-year2038'
        environ:
          CFLAGS: '-O2 -pipe -DSLOW_BUT_NO_HACKS'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: coreutils-dbg
        include: ['/usr/lib/debug/**']

  - name: file
    architecture: '@OPTION:arch@'
    metadata:
      summary: Identify a file's format by scanning binary data for patterns
      description: This package contains an utility for determining the type of a given file or files.
      spdx: 'BSD-2-Clause'
      website: 'https://www.darwinsys.com/file/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['sys-apps']
    from_source: file
    tools_required:
      - cross-gcc
      - host-file
    pkgs_required:
      - mlibc
      - zlib
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-bzlib'
        - '--disable-xzlib'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: file-dbg
        include: ['/usr/lib/debug/**']
