sources:
  - name: gnulib
    subdir: ports
    git: 'https://github.com/coreutils/gnulib.git'
    commit: 'b65a8d11a79bd72224deb06cf379bcbbd713fe36'
    branch: 'master'
    version: '20250811'

  - name: icu
    subdir: 'ports'
    git: 'https://github.com/unicode-org/icu.git'
    tag: 'release-78.3'
    version: '78.3'
    tools_required:
      - host-automake-v1.16
    regenerate:
            - args: |
                find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
                find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;

  - name: libtool
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/libtool.git'
    tag: 'v2.5.4'
    version: '2.5.4'
    sources_required:
      - gnulib
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
    regenerate:
      - args: ['git', 'submodule', 'deinit', 'gnulib']
      - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
      - args: ['./bootstrap', '--gnulib-srcdir=gnulib', '--skip-git']
        isolate_network: false
      - args: ['cp',
          '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
          '@THIS_SOURCE_DIR@/build-aux/']
      - args: ['cp',
          '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.guess',
          '@THIS_SOURCE_DIR@/build-aux/']

tools:
  - name: host-icu
    architecture: noarch
    from_source: icu
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/icu4c/source/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: gmp
    architecture: '@OPTION:arch@'
    metadata:
      summary: Library for arbitrary-precision arithmetic on different type of numbers
      description: The GMP package contains math libraries. These have useful functions for arbitrary precision arithmetic.
      spdx: 'LGPL-3.0-or-later'
      website: 'https://gmplib.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      # We switched to a tarball as the GMP repos are currently returning 403 forbidden (2024-12-31)
      url: 'https://ftpmirror.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz'
      format: 'tar.xz'
      checksum: 'blake2b:a865129e2b3f634ec5bad7f97ed89532e43f5662ac47a7d8ab7f0df8c9f8d0886bd984651422e2573c2163bca69c0547c248147ec90880accbd53db97dc0ddee'
      extract_path: 'gmp-6.3.0'
      version: '6.3.0'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
      regenerate:
        - args: ['autoreconf', '-fvi']
        - args: ['cp', '@THIS_SOURCE_DIR@/configfsf.guess', '@THIS_SOURCE_DIR@/config.guess']
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    revision: 2
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--enable-cxx'
        - '--disable-static'
        - '--docdir=/usr/share/doc/gmp-6.3.0'
        # GMP 6.3.0's "long long reliability" configure probe uses K&R empty
        # parens [void g(){}] then calls g() with args. GCC >=14 defaults to
        # gnu23, where () means (void), making that a hard error and causing
        # GMP to reject the compiler. Pin the C dialect to gnu17.
        - 'CC=@OPTION:arch-triple@-gcc -std=gnu17'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: gmp-dbg
        include: ['/usr/lib/debug/**']

  - name: icu
    architecture: '@OPTION:arch@'
    metadata:
      summary: International Components for Unicode
      description: This package is a mature, widely used set of C/C++ libraries providing Unicode and Globalization support for software applications. ICU is widely portable and gives applications the same results on all platforms.
      spdx: 'BSD'
      website: 'https://icu.unicode.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    from_source: icu
    tools_required:
      - cross-gcc
      - host-icu
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args: ['cp',
          '@THIS_SOURCE_DIR@/icu4c/source/config/mh-linux',
          '@THIS_SOURCE_DIR@/icu4c/source/config/mh-unknown']
      - args:
        - '@THIS_SOURCE_DIR@/icu4c/source/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-cross-build=@BUILD_ROOT@/tool-builds/host-icu'
        - '--with-data-packaging=library'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: icu-dbg
        include: ['/usr/lib/debug/**']

  - name: mpfr
    architecture: '@OPTION:arch@'
    metadata:
      summary: Library for multiple-precision floating-point computations with exact rounding
      description: The MPFR package contains functions for multiple precision math.
      spdx: 'LGPL-3.0-or-later'
      website: 'https://www.mpfr.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://ftpmirror.gnu.org/gnu/mpfr/mpfr-4.2.2.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:6bbf5658e70fbb673a3b65246a6bac708d1571aa6943c6742efd92f468ac71e6f0fe351b757f7133440ea312d9a5fc3549acd89d54f4d975c58bdc204d7b21ec
      extract_path: 'mpfr-4.2.2'
      version: '4.2.2'
      tools_required:
        - host-autoconf-archive
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
      regenerate:
        - args: ['autoreconf', '-v', '-f', '-i', '--warnings=all,error']
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
      - gmp
    revision: 4
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--enable-static=no'
        - '--enable-shared=yes'
        - '--docdir=/usr/share/doc/mpfr-4.2.2'
        - '--with-pic'
        environ:
          # MPFR's configuration script misdetects cross-compilations. Hence,
          # set one of its internal variables to force it into the cross compilation path.
          'user_redefine_cc': 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: mpfr-dbg
        include: ['/usr/lib/debug/**']

  - name: mpc
    architecture: '@OPTION:arch@'
    metadata:
      summary: A library for multiprecision complex arithmetic with exact rounding
      description: The MPC package contains a library for the arithmetic of complex numbers with arbitrarily high precision and correct rounding of the result.
      spdx: 'LGPL-3.0-or-later'
      website: 'https://www.multiprecision.org/mpc/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: ports
      git: 'https://gitlab.inria.fr/mpc/mpc.git'
      tag: '1.3.1'
      version: '1.3.1'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
      regenerate:
        - args: ['autoreconf', '-f', '-i']
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
      - gmp
      - mpfr
    revision: 8
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--docdir=/usr/share/doc/mpc-1.3.1'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: mpc-dbg
        include: ['/usr/lib/debug/**']

  - name: libiconv
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: GNU charset conversion library for libc which doesn't implement it
      description: GNU charset conversion library for libc which doesn't implement it.
      spdx: 'LGPL-2.1-or-later GPL-3.0-or-later'
      website: 'https://www.gnu.org/software/libiconv/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      git: 'https://https.git.savannah.gnu.org/git/libiconv.git'
      tag: 'v1.17'
      version: '1.17'
      sources_required:
        - gnulib
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
        - host-pkg-config
        - host-autoconf-archive
        - host-gettext
      regenerate:
        - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
            '@THIS_SOURCE_DIR@/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
            '@THIS_SOURCE_DIR@/libcharset/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/libtool.m4',
            '@THIS_SOURCE_DIR@/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/libtool.m4',
            '@THIS_SOURCE_DIR@/libcharset/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/ltmain.sh',
            '@THIS_SOURCE_DIR@/libcharset/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/ltmain.sh',
            '@THIS_SOURCE_DIR@/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/ltversion.m4',
            '@THIS_SOURCE_DIR@/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/ltversion.m4',
            '@THIS_SOURCE_DIR@/libcharset/m4/']
        - args: ['autoreconf', '-fvi', '-I@THIS_SOURCE_DIR@/m4', '-I@THIS_SOURCE_DIR@/srcm4']
    tools_required:
      - cross-gcc
      - host-libtool
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@' # Set libtool's lt_sysroot.
        - '--disable-nls'
        - '--enable-shared'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libiconv-dbg
        include: ['/usr/lib/debug/**']

  - name: libintl
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: The GNU international library (split out of gettext)
      description: The GNU international library (split out of gettext)
      spdx: 'LGPL-2.1-or-later'
      website: 'https://www.gnu.org/software/gettext/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://ftpmirror.gnu.org/gnu/gettext/gettext-1.0.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:052bd847c8cdb963437613583256e430b52e27e5ebe29a04df6ac549552ab0f85a1e637b991ebb57e82805fb6d2d23f37c4b70d7f711dc086f57a3a32ba3f00e
      extract_path: 'gettext-1.0'
      version: '1.0'
      patch-path-strip: 1
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
      sources_required:
        - gnulib
      regenerate:
        - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
        # No idea why autoregen doesn't work here.
        - args: |
            find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
    tools_required:
      - cross-gcc
      - host-automake-v1.16
    pkgs_required:
      - mlibc
      - libiconv
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--without-emacs'
        - '--without-lispdir'
        # Normally this controls nls behavior in general, but the libintl
        # subdir is skipped unless this is explicitly set.
        - '--enable-nls'
        # This magic flag enables libintl.
        - '--with-included-gettext'
        - '--disable-c++'
        - '--disable-libasprintf'
        - '--disable-java'
        - '--enable-shared'
        - '--disable-static'
        - '--enable-threads=posix'
        - '--disable-curses'
        - '--without-git'
        - '--without-cvs'
        - '--without-bzip2'
        - '--without-xz'
    build:
      - args: ['make', '-C', 'gettext-runtime/intl', '-j@PARALLELISM@']
      - args: ['make', '-C', 'gettext-runtime/intl', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libintl-dbg
        include: ['/usr/lib/debug/**']

  - name: libffi
    architecture: '@OPTION:arch@'
    metadata:
      summary: Portable foreign-function interface library
      description: This package provides a portable foreign-function interface library.
      spdx: 'MIT'
      website: 'https://sourceware.org/libffi/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://github.com/libffi/libffi/releases/download/v3.4.6/libffi-3.4.6.tar.gz'
      format: 'tar.gz'
      checksum: blake2b:af8402a09bdbd59b4e9400d2d71bd5ce98f6f1d981d35d1ab40d77a831b13b32c5bd34ca54ff75999e39f0d8a9c066381fae7a8d6c5216d955e064f929f08b88
      extract_path: 'libffi-3.4.6'
      version: '3.4.6'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
      regenerate:
        - args: |
            find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
        - args: ['autoreconf', '-fvi']
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--enable-shared'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libffi-dbg
        include: ['/usr/lib/debug/**']

  - name: libexpat
    architecture: '@OPTION:arch@'
    metadata:
      summary: Stream-oriented XML parser library
      description: This package provides the Expat XML parser library.
      spdx: 'MIT'
      website: 'https://libexpat.github.io/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://github.com/libexpat/libexpat/releases/download/R_2_7_3/expat-2.7.3.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:26d4c9cb2c9b2a5b9ca9a86e9ea754e832f397bdb8ef266587b146591ff1358b2f439153f2eadb584180be6aee85050f19987565bbedf215993061ce5c85c5c9
      extract_path: 'expat-2.7.3'
      version: '2.7.3'
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-S'
        - '@THIS_SOURCE_DIR@'
        - '-B'
        - '@THIS_BUILD_DIR@'
        - '-G'
        - 'Ninja'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/cmake-@OPTION:arch@.toolchain'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_INSTALL_LIBDIR=lib'
        - '-DCMAKE_BUILD_TYPE=Release'
        - '-DBUILD_SHARED_LIBS=ON'
        - '-DCMAKE_C_FLAGS=-D_DEFAULT_SOURCE'
        - '-DCMAKE_SYSROOT=@SYSROOT_DIR@'
        - '-DCMAKE_FIND_ROOT_PATH=@SYSROOT_DIR@'
    build:
      - args: ['cmake', '--build', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['cmake', '--install', '@THIS_BUILD_DIR@']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libexpat-dbg
        include: ['/usr/lib/debug/**']

  - name: libpng
    architecture: '@OPTION:arch@'
    metadata:
      summary: Portable Network Graphics library
      description: This package provides the PNG reference library.
      spdx: 'libpng-2.0'
      website: 'http://www.libpng.org/pub/png/libpng.html'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://prdownloads.sourceforge.net/libpng/libpng-1.6.58.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:51042e8f2b56d469b516db9cbde6d4b6813a62d1b7117898ba32a9a5ac5cd73832c627d7377745e5d5154aade6ec6928fc6b9cd9b96885f64b7ca7df19ca40ec
      extract_path: 'libpng-1.6.58'
      version: '1.6.58'
    tools_required:
      - cross-gcc
      - host-pkg-config
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - zlib
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-S'
        - '@THIS_SOURCE_DIR@'
        - '-B'
        - '@THIS_BUILD_DIR@'
        - '-G'
        - 'Ninja'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/cmake-@OPTION:arch@.toolchain'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_INSTALL_LIBDIR=lib'
        - '-DCMAKE_BUILD_TYPE=Release'
        - '-DBUILD_SHARED_LIBS=ON'
        - '-DCMAKE_SYSROOT=@SYSROOT_DIR@'
        - '-DCMAKE_FIND_ROOT_PATH=@SYSROOT_DIR@'
        - '-DPNG_STATIC=OFF'
        - '-DPNG_TESTS=OFF'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['cmake', '--build', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['cmake', '--install', '@THIS_BUILD_DIR@']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: libpng-dbg
        include: ['/usr/lib/debug/**']

  - name: openssl
    architecture: '@OPTION:arch@'
    metadata:
      summary: Robust, full-featured Open Source Toolkit for the TLS and SSL protocols
      description: This package provides the OpenSSL toolkit and libraries.
      spdx: 'Apache-2.0'
      website: 'https://www.openssl.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      url: 'https://github.com/openssl/openssl/releases/download/openssl-3.6.1/openssl-3.6.1.tar.gz'
      format: 'tar.gz'
      checksum: blake2b:da949967d40ca9e17baf1bedded5080e37bce2dfc187f2a46f80ec01e708f9d550d055ef8557812135c4a1081b8f3477c5d4dbe46e0f39a9b696a7dbdc6b769a
      extract_path: 'openssl-3.6.1'
      version: '3.6.1'
      patch-path-strip: 1
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
      - zlib
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/Configure'
        - '--prefix=/usr'
        - '--openssldir=/etc/ssl'
        - '--libdir=lib'
        - '@OPTION:arch-triple@'
        - 'shared'
        - 'zlib-dynamic'
        - 'no-asm'
        - 'no-afalgeng'
        environ:
          CC: '@OPTION:arch-triple@-gcc'
          CXX: '@OPTION:arch-triple@-g++'
          AR: '@OPTION:arch-triple@-ar'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: |
          sed -i '/INSTALL_LIBS/s/libcrypto.a libssl.a//' Makefile
          make DESTDIR="@THIS_COLLECT_DIR@" MANSUFFIX=ssl install
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: openssl-dbg
        include: ['/usr/lib/debug/**']

