packages:
  - name: xauth
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xauth.git'
      tag: 'xauth-1.1.5'
      version: '1.1.5'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
        - host-autoconf-archive
        - host-xtrans
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-gcc
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-pkg-config
    pkgs_required:
      - mlibc
      - libX11
      - libXau
      - libXdmcp
      - libXext
      - libXmu
      - xtrans
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: xauth-dbg
        include: ['/usr/lib/debug/**']

  - name: xinit
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xinit.git'
      tag: 'xinit-1.4.4'
      version: '1.4.4'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
        - host-pkg-config
        - host-xorg-util-macros
        - host-autoconf-archive
        - host-xtrans
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-gcc
      - host-autoconf-v2.71
      - host-automake-v1.16
      - host-pkg-config
    pkgs_required:
      - mlibc
      - libX11
      - svr4utils
      - xauth
      - xorg-proto
      - xtrans
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xkbcomp
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xkbcomp.git'
      tag: 'xkbcomp-1.5.0'
      version: '1.5.0'
    tools_required:
      - cross-gcc
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - xorg-util-macros
      - libX11
      - libxkbfile
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Ddefault_library=shared'
        - '@THIS_SOURCE_DIR@'
        - '@THIS_BUILD_DIR@'
        environ:
          PKG_CONFIG: '@OPTION:arch-triple@-pkg-config'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@', '-j@PARALLELISM@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: xkbcomp-dbg
        include: ['/usr/lib/debug/**']

