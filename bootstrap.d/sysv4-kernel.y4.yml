sources:
  - name: uts
    git: 'https://github.com/svr4-reborn/svr4'
    branch: 'main'
    rolling_version: true
    version: '0.0pl@ROLLING_ID@'

packages:
  - name: uts
    architecture: '@OPTION:arch@'
    from_source: uts
    revision: 1

  - name: svr4utils
    architecture: '@OPTION:arch@'
    revision: 1
    source:
      git: 'https://github.com/svr4-reborn/svr4utils.git'
      branch: 'master'
      rolling_version: true
      version: '0.0pl@ROLLING_ID@'
      subdir: 'ports'
    revision: 1
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
