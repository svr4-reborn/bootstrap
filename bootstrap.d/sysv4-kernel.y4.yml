sources:
  - name: uts
    git: 'https://github.com/svr4-reborn/uts'
    branch: 'master'
    rolling_version: true
    version: '0.0pl@ROLLING_ID@'

tools:
  - name: host-idtools
    architecture: noarch
    from_source: uts
    revision: 1
    # A meson project located under idtools in uts.
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--prefix=@PREFIX@'
        - '@THIS_SOURCE_DIR@/idtools'
    compile:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@']
    install:
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@']

packages:
  - name: idtools
    architecture: '@OPTION:arch@'
    from_source: uts
    revision: 1
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        # Traditional place these things went, for some reason
        - '--prefix=/etc/conf'
        - '@THIS_SOURCE_DIR@/idtools'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']

  - name: uts
    architecture: '@OPTION:arch@'
    from_source: uts
    revision: 1
    tools_required:
      - cross-gcc
      - host-python
      - host-idtools
    # Meson builds the whole /etc/conf tree (compiled pack.d objects + the staged
    # device/fs metadata) exactly as it lands on the system; the build steps then
    # drive idconfig/idmkunix over that tree to produce conf.c/config.h/unix (the
    # non-interactive equivalent of the on-system `idbuild`), build the boot
    # artifacts, and collect the package. Replaces the old build.py + YAML engine.
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        # The conf tree root. '' => prefix IS the conf root; install to an
        # intermediate prefix the build steps run idtools over before collecting.
        - '--prefix=/'
        - '@THIS_SOURCE_DIR@/meson'
    build:
      # 1. Build + install the full /etc/conf tree into an intermediate conf root.
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@']
      - args:
        - 'meson'
        - 'install'
        - '-C'
        - '@THIS_BUILD_DIR@'
        - '--destdir'
        - '@THIS_BUILD_DIR@/conf-root'

      # 2. idconfig + idmkunix over the staged tree => conf.c/config.h/fsconf.c/
      #    vector.c/direct and the final `unix` (and the stubs-only modules'
      #    Driver.o). This is what `idbuild` wraps on the running system.
      - args:
        - 'sh'
        - '-eu'
        - '-c'
        - |
          conf="@THIS_BUILD_DIR@/conf-root"
          cf="$conf/cf.d"

          # idmkunix reads the toolchain / codegen / defines / kernel-header
          # include dirs from cf.d/idmkunix.conf (installed by Meson), the same
          # file the on-system `idbuild` uses -- so the relink is identical and
          # nothing is hardcoded here. INCDIRS in that file are conf-tree-
          # relative, resolved against $conf via the -i cf.d we pass.
          idconfig -r "$conf" -i "$cf" -o "$cf"
          ( cd "$cf" && idmkunix -i "$cf" -o "$cf" -p "$conf/pack.d" )

      # 3. Collect into the package: /stand, /etc/conf, /etc/{default,initprog},
      #    .fboot/.wboot. The boot artifacts (hdboot/.fboot/initprog/default.*)
      #    are now built + installed into the conf-root by Meson itself (see
      #    uts/meson/boot/meson.build), replacing the old uts_build_boot.py /
      #    uts_boot_initprog.py / uts_boot_symvals.py shell-out. We only mirror
      #    the few files that ship under two names/dirs (.wboot, /stand/boot,
      #    /etc/initprog).
      - args:
        - 'sh'
        - '-eu'
        - '-c'
        - |
          conf="@THIS_BUILD_DIR@/conf-root"
          dest="@THIS_COLLECT_DIR@"

          mkdir -p "$dest/stand" "$dest/etc/initprog" "$dest/etc/default"
          cp -p "$conf/cf.d/unix" \
                "$conf/stand/hdboot" \
                "$conf/stand/at386" "$conf/stand/att" "$conf/stand/compaq" \
                "$dest/stand/"
          # /stand/boot is default.at386 under another name.
          cp -p "$conf/etc/default/default.at386" "$dest/stand/boot"
          cp -p "$conf/stand/at386" "$conf/stand/att" "$conf/stand/compaq" \
                "$dest/etc/initprog/"
          cp -p "$conf"/etc/default/* "$dest/etc/default/"
          cp -p "$conf/etc/.fboot" "$dest/etc/.fboot"
          # /etc/.wboot is the same image as /stand/hdboot (the hard-disk boot).
          cp -p "$conf/stand/hdboot" "$dest/etc/.wboot"

          # /etc/conf: the reconfigurable kernel tree.
          mkdir -p "$dest/etc/conf/cf.d"
          for f in unix kernmap vuifile mdevice mfsys sdevice sfsys mtune stune sassign conf.c config.h fsconf.c vector.c direct idmkunix.conf; do
            [ -f "$conf/cf.d/$f" ] && cp -p "$conf/cf.d/$f" "$dest/etc/conf/cf.d/"
          done
          cp -rp "$conf/pack.d" "$dest/etc/conf/"
          for d in sdevice.d sfsys.d mfsys.d mdevice.d node.d; do
            [ -d "$conf/$d" ] && cp -rp "$conf/$d" "$dest/etc/conf/"
          done
          # Copy the kernel headers.
          [ -d "$conf/inc" ] && cp -rp "$conf/inc" "$dest/etc/conf/"
          # drop build-only intermediates that should not ship in pack.d
          find "$dest/etc/conf/pack.d" -name '*.o' \
            ! -name 'Driver.o' ! -name 'kernel.o' \
            ! -name 'start.o' ! -name 'locore.o' ! -name 'syms.o' \
            -delete 2>/dev/null || true

  - name: svr4utils
    architecture: '@OPTION:arch@'
    revision: 1
    source:
      git: 'https://github.com/svr4-reborn/svr4utils.git'
      branch: 'master'
      rolling_version: true
      version: '0.0pl@ROLLING_ID@'
      subdir: 'ports'
    revision: 1
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch@.cross-file'
        - '--prefix=/usr'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['meson', 'compile', '-C', '@THIS_BUILD_DIR@']
      - args: ['meson', 'install', '-C', '@THIS_BUILD_DIR@', '--destdir', '@THIS_COLLECT_DIR@']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: svr4utils-dbg
        include: ['/usr/lib/debug/**']
