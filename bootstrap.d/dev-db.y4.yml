packages:
  - name: sqlite
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: SQL database engine
      description: The sqlite package contains a software library that implements a self-contained, serverless, zero-configuration, transactional SQL database engine. 
      spdx: 'no-spdx: public-domain'
      website: 'https://sqlite.org/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-db']
    source:
      subdir: 'ports'
      url: 'https://sqlite.org/2026/sqlite-autoconf-3530200.tar.gz'
      format: 'tar.gz'
      checksum: blake2b:161b1e3e2fa6bf078d664a3ff966759f5be65a61e60748a81562782c28ac4b4e366a0f7a9f6da26c150b0a0a586d7bceb76322455f6ffbd276de92d19c133909
      extract_path: 'sqlite-autoconf-3530200'
      version: '3.53.2'
      regenerate:
        - args: |
            find @THIS_SOURCE_DIR@ -name *config.sub -exec cp -pv @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name *config.guess -exec cp -pv @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
    tools_required:
      - cross-gcc
      - host-libtool
    pkgs_required:
      - mlibc
      - readline
      - zlib
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--soname=legacy'
        - '--disable-static'
        - '--enable-fts5'
        - '--enable-fts4'
        - 'CPPFLAGS=-DSQLITE_ENABLE_COLUMN_METADATA=1 -DSQLITE_ENABLE_UNLOCK_NOTIFY=1 -DSQLITE_ENABLE_DBSTAT_VTAB=1 -DSQLITE_SECURE_DELETE=1'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: sqlite-dbg
        include: ['/usr/lib/debug/**']
