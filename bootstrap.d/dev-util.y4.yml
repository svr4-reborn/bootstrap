sources:
  - name: 'pkg-config'
    subdir: 'ports'
    git: 'https://gitlab.freedesktop.org/pkg-config/pkg-config.git'
    tag: 'pkg-config-0.29.2'
    version: '0.29.2'
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.11
      - host-libtool
    regenerate:
      - args: ['./autogen.sh']
        environ:
          'NOCONFIGURE': 'yes'

tools:
  - name: host-pkg-config
    architecture: noarch
    exports_aclocal: true
    from_source: pkg-config
    revision: 2
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
        - '--with-internal-glib'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: pkgconf
    metadata:
      summary: Package compiler and linker metadata toolkit
      description: This package provides pkgconf, a pkg-config compatible implementation.
      spdx: 'ISC'
      website: 'https://github.com/pkgconf/pkgconf'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['dev-util']
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      url: 'https://distfiles.ariadne.space/pkgconf/pkgconf-2.3.0.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:cca3476df0b79cdbca798ed3a067611414e9b422e8347d0f490e7c4d0c43cdd2c7b586ac11e028a8df365d4ea4194f46b1d9fc0acd0f5fd6b4a5548673a8f853
      extract_path: 'pkgconf-2.3.0'
      version: '2.3.0'
      tools_required:
        - host-autoconf-v2.71
        - host-automake-v1.16
        - host-libtool
      regenerate:
        - args: |
            find @THIS_SOURCE_DIR@ -name config.sub -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.sub {} \;
            find @THIS_SOURCE_DIR@ -name config.guess -exec cp @BUILD_ROOT@/tools/host-automake-v1.16/share/automake-1.16/config.guess {} \;
        - args: ['autoreconf', '-fvi']
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--enable-shared'
        - '--with-system-libdir=/usr/lib'
        - '--with-system-includedir=/usr/include'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['ln', '-sf', 'pkgconf', '@THIS_COLLECT_DIR@/usr/bin/pkg-config']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: pkgconf-dbg
        include: ['/usr/lib/debug/**']
