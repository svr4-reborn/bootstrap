sources:
  - name: bison
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/bison.git'
    tag: 'v3.8.2'
    version: '3.8.2'
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.15
      - host-libtool
    sources_required:
      - gnulib
    regenerate:
      - args: ['git', 'submodule', 'set-url', 'submodules/autoconf', 'https://https.git.savannah.gnu.org/git/autoconf.git']
      - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
      - args: ['git', 'submodule', 'update', '--init']
        isolate_network: false
      - args: ['./bootstrap', '--skip-po']
      - args: ['cp',
          '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
          '@THIS_SOURCE_DIR@/build-aux/']

  - name: gettext
    subdir: ports
    url: 'https://ftpmirror.gnu.org/gnu/gettext/gettext-0.22.3.tar.gz'
    checksum: blake2b:aebe85a82cb94c37ed81e9801acf1e89d150f5992fb9be42d53b3f2734c5c95804f0051fabc26b8d0892dfaf89d18df16d4bca6bcb2e9b95eef5d4ae93a64379
    extract_path: 'gettext-0.22.3'
    format: 'tar.gz'
    version: '0.22.3'

  - name: binutils
    subdir: 'ports'
    url: 'https://ftpmirror.gnu.org/gnu/binutils/binutils-with-gold-2.44.tar.xz'
    checksum: 'blake2b:d749d5fbab2d6c2455bf9a988daa5c5ab9ecd9ecd63e4be022bc06483ebc996588c515ee4b931ff2ba7bcf43242068c0747e1cad50740523b2073df5a338614f'
    extract_path: 'binutils-with-gold-2.44'
    format: 'tar.xz'
    version: '2.44'
    patch-path-strip: 1
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15

  - name: gnuconfig
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/config.git'
    branch: 'master'
    commit: '63acb96f92473ceb5e21d873d7c0aee266b3d6d3'
    version: '20230121'

  - name: gcc
    subdir: 'ports'
    git: 'https://github.com/svr4-reborn/gcc.git'
    branch: 'releases/gcc-16'
    tag: 'releases/gcc-16.1.0'
    version: '16.1.0'
    sources_required: ['gnuconfig']
    regenerate:
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.sub', '@THIS_SOURCE_DIR@/.']
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.guess', '@THIS_SOURCE_DIR@/.']

tools:
  - name: host-bison
    labels: [aarch64, riscv64]
    architecture: noarch
    from_source: bison
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
    revision: 2
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

  - name: host-gettext
    labels: [aarch64, riscv64]
    architecture: noarch
    from_source: gettext
    exports_aclocal: true
    tools_required:
      - host-bison
      - host-autoconf-v2.69
      - host-automake-v1.15
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make']
    install:
      - args: ['make', 'install']
