sources:
  - name: bison
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/bison.git'
    tag: 'v3.8.2'
    version: '3.8.2'
    tools_required:
      - host-autoconf-v2.71
      - host-automake-v1.15
      - host-libtool
    sources_required:
      - gnulib
    regenerate:
      - args: ['git', 'submodule', 'set-url', 'submodules/autoconf', 'https://https.git.savannah.gnu.org/git/autoconf.git']
      - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
      - args: ['git', 'submodule', 'update', '--init']
        isolate_network: false
      - args: ['./bootstrap', '--skip-po']
      - args: ['cp',
          '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
          '@THIS_SOURCE_DIR@/build-aux/']

  - name: gettext
    subdir: ports
    url: 'https://ftpmirror.gnu.org/gnu/gettext/gettext-0.22.3.tar.gz'
    checksum: blake2b:aebe85a82cb94c37ed81e9801acf1e89d150f5992fb9be42d53b3f2734c5c95804f0051fabc26b8d0892dfaf89d18df16d4bca6bcb2e9b95eef5d4ae93a64379
    extract_path: 'gettext-0.22.3'
    format: 'tar.gz'
    version: '0.22.3'

  - name: binutils
    subdir: 'ports'
    url: 'https://ftpmirror.gnu.org/gnu/binutils/binutils-with-gold-2.44.tar.xz'
    checksum: 'blake2b:d749d5fbab2d6c2455bf9a988daa5c5ab9ecd9ecd63e4be022bc06483ebc996588c515ee4b931ff2ba7bcf43242068c0747e1cad50740523b2073df5a338614f'
    extract_path: 'binutils-with-gold-2.44'
    format: 'tar.xz'
    version: '2.44'
    patch-path-strip: 1
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15

  - name: gnuconfig
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/config.git'
    branch: 'master'
    commit: '63acb96f92473ceb5e21d873d7c0aee266b3d6d3'
    version: '20230121'

  - name: gcc
    subdir: 'ports'
    git: 'https://github.com/svr4-reborn/gcc.git'
    branch: 'releases/gcc-16'
    tag: 'releases/gcc-16.1.0'
    version: '16.1.0'
    sources_required: ['gnuconfig']
    regenerate:
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.sub', '@THIS_SOURCE_DIR@/.']
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.guess', '@THIS_SOURCE_DIR@/.']

tools:
  - name: host-bison
    architecture: noarch
    from_source: bison
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
    revision: 2
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

  - name: host-gettext
    architecture: noarch
    from_source: gettext
    exports_aclocal: true
    tools_required:
      - host-bison
      - host-autoconf-v2.69
      - host-automake-v1.15
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make']
    install:
      - args: ['make', 'install']

packages:
  - name: autoconf-archive
    architecture: '@OPTION:arch@'
    metadata:
      summary: Collection of reusable Autoconf macros
      description: This package provides reusable Autoconf macros for use by other packages.
      spdx: 'GPL-3.0-or-later WITH Autoconf-exception-3.0'
      website: 'https://www.gnu.org/software/autoconf-archive/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['sys-devel']
    source:
      subdir: ports
      url: 'https://ftpmirror.gnu.org/gnu/autoconf-archive/autoconf-archive-2024.10.16.tar.xz'
      format: 'tar.xz'
      checksum: blake2b:64554b7258c527f2e6bb115bec08e358bd4f10b940cdbe58c073fb3bdeccab78897250766e600b7e5fd79a76d633135d1caf2c7e81893bd68cab704073cac2c5
      extract_path: 'autoconf-archive-2024.10.16'
      version: '2024.10.16'
    revision: 1
    build:
      - args: ['mkdir', '-p', '@THIS_COLLECT_DIR@/usr/share/aclocal']
      - args: ['cp', '-r', '@THIS_SOURCE_DIR@/m4/.', '@THIS_COLLECT_DIR@/usr/share/aclocal/']

  - name: binutils
    architecture: '@OPTION:arch@'
    metadata:
      summary: Tools necessary to build programs
      description: This package provides various tools commonly used during package development, including the GNU linker and the GNU assembler. This package also includes libbfd and libopcodes.
      spdx: 'GPL-3.0-or-later'
      website: 'https://www.gnu.org/software/binutils/'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['sys-devel']
    from_source: binutils
    tools_required:
      - tool: cross-gcc
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--with-pkgversion=svr4-reborn'
        - '--with-bugurl=https://github.com/svr4-reborn/bootstrap/issues/'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--target=@OPTION:arch-triple@'
        - '--with-sysroot=/'
        - '--disable-nls'
        # On recent compilers, binutils 2.26 causes implicit-fallthrough warnings, among others.
        - '--disable-werror'
        - '--disable-gdb'
        # -g blows up the binary size.
        - 'CFLAGS=-O2'
    build:
      - args: ['make', '-j@PARALLELISM@', 'all-binutils', 'all-gas', 'all-ld']
      - args: ['make', 'install-binutils', 'install-gas', 'install-ld']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true

  - name: gcc
    architecture: '@OPTION:arch@'
    from_source: gcc
    tools_required:
      - tool: cross-gcc
      - host-automake-v1.15
    pkgs_required:
      - mlibc
      - binutils
      - gmp
      - mpfr
      - mpc
      - zlib
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--with-pkgversion=svr4-reborn'
        - '--with-bugurl=https://github.com/svr4-reborn/bootstrap/issues/'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--target=@OPTION:arch-triple@'
        - '--with-sysroot=/'
        - '--with-build-sysroot=@SYSROOT_DIR@'
        - '--enable-languages=c,c++'
        - '--enable-initfini-array'
        - '--disable-nls'
        - '--disable-fixincludes'
        - '--enable-lto'
        - '--with-system-zlib'
        - '--enable-linker-build-id'
        - '--enable-default-pie'
        # -g blows up GCC's binary size.
        - 'CFLAGS=-O2'
        - 'CXXFLAGS=-O2'
    build:
      - args: ['make', 'all-gcc', 'all-target-libgcc', 'all-target-libatomic', 'all-target-libstdc++-v3', '-j@PARALLELISM@']
      - args: ['make', 'install-gcc', 'install-target-libgcc', 'install-target-libatomic', 'install-target-libstdc++-v3']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true
      - args: ['ln', '-sf', 'gcc', '@THIS_COLLECT_DIR@/usr/bin/cc']
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      # We need to add /usr/lib and /usr/lib64, because riscv doesn't use lib64 but aarch64 and amd64 do.
      - name: libgcc
        include: ['/usr/lib*/libgcc_s.so*', '/usr/lib/gcc/*-mlibc*/16.1.0/libgcc*']
      - name: libatomic
        include: ['/usr/lib*/libatomic.so*']
      - name: libstdc++
        include: ['/usr/include/**', '/usr/lib*/libstdc++*', '/usr/lib*/libsupc++.a', '/usr/share/gcc-16.1.0/**']
      - name: gcc-dbg
        include: ['/usr/lib/debug/**']  
