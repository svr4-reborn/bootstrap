sources:
  - name: xorg-font-util
    subdir: 'ports'
    git: 'https://gitlab.freedesktop.org/xorg/font/util.git'
    tag: 'font-util-1.4.1'
    version: '1.4.1'
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
      - host-libtool
      - host-pkg-config
      - host-xorg-util-macros
    regenerate:
      - args: ['./autogen.sh']
        environ:
          'NOCONFIGURE': 'yes'

tools:
  - name: host-xorg-font-util
    architecture: noarch
    exports_aclocal: true
    from_source: xorg-font-util
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: xorg-font-util
    architecture: '@OPTION:arch@'
    metadata:
      summary: X.Org font utilities
      description: This package provides various X.Org font utilities.
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/xorg/font/util'
      maintainer: "Alexander Richards <electrodeyt@gmail.com>"
      categories: ['media-fonts']
    from_source: xorg-font-util
    tools_required:
      - cross-gcc
    pkgs_required:
      - mlibc
    revision: 3
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'